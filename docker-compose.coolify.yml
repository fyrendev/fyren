# Fyren Docker Compose for Coolify
# Uses Coolify's built-in Traefik proxy for SSL and routing

services:
  # ===================================
  # PostgreSQL Database
  # ===================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fyren}
      POSTGRES_USER: ${POSTGRES_USER:-fyren}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fyren} -d ${POSTGRES_DB:-fyren}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ===================================
  # Redis Cache & Queue
  # ===================================
  fyren-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ===================================
  # Fyren API (runs migrations on startup)
  # ===================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      fyren-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-fyren}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fyren}
      REDIS_URL: redis://:${REDIS_PASSWORD}@fyren-redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${APP_URL:?APP_URL is required}
      APP_URL: ${APP_URL}
      MIGRATIONS_PATH: ./drizzle
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@fyren.dev}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
    labels:
      - "traefik.enable=true"
      # API routes
      - "traefik.http.routers.fyren-api.rule=Host(`${APP_DOMAIN:?APP_DOMAIN is required}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.fyren-api.entrypoints=https"
      - "traefik.http.routers.fyren-api.tls=true"
      - "traefik.http.routers.fyren-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.fyren-api.loadbalancer.server.port=3001"
      # Health endpoint
      - "traefik.http.routers.fyren-health.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/health`)"
      - "traefik.http.routers.fyren-health.entrypoints=https"
      - "traefik.http.routers.fyren-health.tls=true"
      - "traefik.http.routers.fyren-health.tls.certresolver=letsencrypt"
    networks:
      - internal
      - coolify

  # ===================================
  # Fyren Worker (Monitor checks, notifications)
  # ===================================
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      fyren-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-fyren}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fyren}
      REDIS_URL: redis://:${REDIS_PASSWORD}@fyren-redis:6379
      RUN_MIGRATIONS: "false"
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@fyren.dev}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
    command: ["bun", "run", "dist/worker.js"]
    networks:
      - internal

  # ===================================
  # Fyren Web (Next.js)
  # ===================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: ${APP_URL}/api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fyren-web.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.fyren-web.entrypoints=https"
      - "traefik.http.routers.fyren-web.tls=true"
      - "traefik.http.routers.fyren-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.fyren-web.loadbalancer.server.port=3000"
      # Lower priority so /api routes go to api service
      - "traefik.http.routers.fyren-web.priority=1"
    networks:
      - internal
      - coolify

# ===================================
# Volumes
# ===================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ===================================
# Networks
# ===================================
networks:
  internal:
    driver: bridge
  coolify:
    external: true
