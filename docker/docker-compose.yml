services:
  postgres:
    image: postgres:16-alpine
    container_name: fyren-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fyren
      POSTGRES_PASSWORD: fyren
      POSTGRES_DB: fyren
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fyren -d fyren"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fyren-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # API service (for production use)
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fyren-api
    restart: unless-stopped
    command: bun run dev
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://fyren:fyren@postgres:5432/fyren
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

  # Worker service (for production use)
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fyren-worker
    restart: unless-stopped
    command: bun run worker
    environment:
      - DATABASE_URL=postgresql://fyren:fyren@postgres:5432/fyren
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

volumes:
  postgres_data:
  redis_data:
